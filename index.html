<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  img { max-width: 100vw; max-height: 100vh; object-fit: contain; }
  .msg { color: #fff; font-family: sans-serif; font-size: 1.2rem; }
</style>
</head>
<body>
<p class="msg" id="msg">Loading...</p>
<img id="photo" style="display:none" alt="Random photo">
<script>
const photos = [
  "https://i.imgur.com/lvIThJ7.jpeg",
  "https://i.imgur.com/AUKr75H.jpeg",
  "https://i.imgur.com/nIdWqEp.jpeg",
  "https://i.imgur.com/oCUY3W7.jpeg",
  "https://i.imgur.com/L1ENeIr.jpeg",
  "https://i.imgur.com/9Nfqvh4.jpeg",
  "https://i.imgur.com/S4mDoIC.jpeg",
  "https://i.imgur.com/EY38SNR.jpeg",
  "https://i.imgur.com/TEagbKr.jpeg",
  "https://i.imgur.com/Bu00j2e.jpeg",
  "https://i.imgur.com/hSkhLCR.jpeg",
  "https://i.imgur.com/HKCIhMl.jpeg",
  "https://i.imgur.com/l41GZu3.jpeg",
  "https://i.imgur.com/PM5ROsJ.jpeg",
  "https://i.imgur.com/HooY6PR.jpeg",
  "https://i.imgur.com/gNHvwds.jpeg",
  "https://i.imgur.com/nfeUvoz.jpeg",
  "https://i.imgur.com/VITvuMr.jpeg"
];
const url = photos[Math.floor(Math.random() * photos.length)];
const img = document.getElementById('photo');
img.src = url;
img.onload = () => { document.getElementById('msg').style.display='none'; img.style.display='block'; };
img.onerror = () => { document.getElementById('msg').textContent='Could not load photo.'; };
</script>
</body>
</html>
