<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  img { max-width: 100vw; max-height: 100vh; object-fit: contain; }
  .msg { color: #fff; font-family: sans-serif; font-size: 1.2rem; }
</style>
</head>
<body>
<p class="msg" id="msg">Loading...</p>
<img id="photo" style="display:none" alt="Random photo">
<script>
const photos = [
  "https://lh3.googleusercontent.com/d/1PeZVB_qAittNAwJxjSiqORp3Lj5QGwL-",
  "https://lh3.googleusercontent.com/d/13AW2Y7Re3BeGCsPc4nWhfR9N45I22gBf",
  "https://lh3.googleusercontent.com/d/1-XBzmxPIHD8V7hBCW6Ps7ud1KYmbAHRd",
  "https://lh3.googleusercontent.com/d/1tWtjrBKo8vc6I8VyK_DUa8NU_k_fd5yi",
  "https://lh3.googleusercontent.com/d/15jKH9lLDNzjw_hoOUqE6Im5cHmdkK3QL",
  "https://lh3.googleusercontent.com/d/1_ZZ4d7zBfyeo3MkzHMKchrETBSEGEykP",
  "https://lh3.googleusercontent.com/d/1iNcW9pxYK-7ABpKidtsetomzT4vBT8u9",
  "https://lh3.googleusercontent.com/d/1kN8tzij43YU-s2Uj-pIH89FBdkjoa2QU",
  "https://lh3.googleusercontent.com/d/1DRyKjFiXuMuOtjfqyT0PI7Ta2Y7e5XsB",
  "https://lh3.googleusercontent.com/d/1HfiDMyfXExvu3JOo06RYtmhX0ZCPiHD1",
  "https://lh3.googleusercontent.com/d/1mseO1Pr26zZtx4geB2tk15XNIQsV5a-P",
  "https://lh3.googleusercontent.com/d/1r5rSkUyUQXeTlkTHKPnP1r9smFo3_3Jn",
  "https://lh3.googleusercontent.com/d/11lsCaNpID20s_-xUNK_PEw6YyPqG0kK-",
  "https://lh3.googleusercontent.com/d/19QNCAvX0PQtPCpeWYICGrcsSM4FJgDVE",
  "https://lh3.googleusercontent.com/d/1WrVUmunT82Ttg-s7s-Q9YKySSpfnQtFU",
  "https://lh3.googleusercontent.com/d/1d6oBWornkv7EzmteSLlJ6jKKtQRL-8VE",
  "https://lh3.googleusercontent.com/d/14fc1Su2zDdq7N1k_1WX7y3RHbJHTW8cN",
  "https://lh3.googleusercontent.com/d/1JKGmaEdWThfBYdUgiuSwuY2bDLOjA9DP"
];
const url = photos[Math.floor(Math.random() * photos.length)];
const img = document.getElementById('photo');
img.src = url;
img.onload = () => { document.getElementById('msg').style.display='none'; img.style.display='block'; };
img.onerror = () => { document.getElementById('msg').textContent='Could not load photo.'; };
</script>
</body>
</html>
