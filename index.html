<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store">
<title>✨</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; height: 100vh; }
  img { max-width: 100vw; max-height: 100vh; object-fit: contain; display: block; }
</style>
</head>
<body>
<img id="photo" alt="Random photo">
<script>
const ids = [
  "lvIThJ7","nIdWqEp","oCUY3W7","L1ENeIr","S4mDoIC",
  "TEagbKr","Bu00j2e","hSkhLCR","l41GZu3","PM5ROsJ",
  "HooY6PR","gNHvwds","nfeUvoz","VITvuMr"
];
const id = ids[Math.floor(Math.random() * ids.length)];
const img = document.getElementById('photo');
img.src = "https://i.imgur.com/" + id + ".jpeg";
img.onerror = function() {
  this.onerror = null;
  this.src = "https://i.imgur.com/" + id + ".png";
};
</script>
</body>
</html>
