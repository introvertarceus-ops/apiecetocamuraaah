<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Random Photo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a1a; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  img { max-width: 100vw; max-height: 100vh; object-fit: contain; border-radius: 8px; }
  .loading { color: #fff; font-family: sans-serif; font-size: 1.2rem; }
</style>
</head>
<body>
<p class="loading" id="msg">Loading...</p>
<img id="photo" style="display:none" alt="Random photo">
<script>
const photos = [
  "https://drive.google.com/file/d/1PeZVB_qAittNAwJxjSiqORp3Lj5QGwL-/view?usp=drive_link",
  "https://drive.google.com/file/d/13AW2Y7Re3BeGCsPc4nWhfR9N45I22gBf/view?usp=drive_link",
  "https://drive.google.com/file/d/1-XBzmxPIHD8V7hBCW6Ps7ud1KYmbAHRd/view?usp=drive_link",
  "https://drive.google.com/file/d/1tWtjrBKo8vc6I8VyK_DUa8NU_k_fd5yi/view?usp=drive_link",
  "https://drive.google.com/file/d/15jKH9lLDNzjw_hoOUqE6Im5cHmdkK3QL/view?usp=drive_link",
  "https://drive.google.com/file/d/1_ZZ4d7zBfyeo3MkzHMKchrETBSEGEykP/view?usp=drive_link",
  "https://drive.google.com/file/d/1iNcW9pxYK-7ABpKidtsetomzT4vBT8u9/view?usp=drive_link",
  "https://drive.google.com/file/d/1kN8tzij43YU-s2Uj-pIH89FBdkjoa2QU/view?usp=drive_link",
  "https://drive.google.com/file/d/1DRyKjFiXuMuOtjfqyT0PI7Ta2Y7e5XsB/view?usp=drive_link",
  "https://drive.google.com/file/d/1HfiDMyfXExvu3JOo06RYtmhX0ZCPiHD1/view?usp=drive_link",
  "https://drive.google.com/file/d/1mseO1Pr26zZtx4geB2tk15XNIQsV5a-P/view?usp=drive_link",
  "https://drive.google.com/file/d/1r5rSkUyUQXeTlkTHKPnP1r9smFo3_3Jn/view?usp=drive_link",
  "https://drive.google.com/file/d/11lsCaNpID20s_-xUNK_PEw6YyPqG0kK-/view?usp=drive_link",
  "https://drive.google.com/file/d/19QNCAvX0PQtPCpeWYICGrcsSM4FJgDVE/view?usp=drive_link",
  "https://drive.google.com/file/d/1WrVUmunT82Ttg-s7s-Q9YKySSpfnQtFU/view?usp=drive_link",
  "https://drive.google.com/file/d/1d6oBWornkv7EzmteSLlJ6jKKtQRL-8VE/view?usp=drive_link",
  "https://drive.google.com/file/d/14fc1Su2zDdq7N1k_1WX7y3RHbJHTW8cN/view?usp=drive_link",
  "https://drive.google.com/file/d/1JKGmaEdWThfBYdUgiuSwuY2bDLOjA9DP/view?usp=drive_link"
];
const url = photos[Math.floor(Math.random() * photos.length)];
const img = document.getElementById('photo');
img.src = url;
img.onload = () => { document.getElementById('msg').style.display='none'; img.style.display='block'; };
img.onerror = () => { document.getElementById('msg').textContent='Could not load photo. Check sharing settings.'; };
</script>
</body>
</html>
